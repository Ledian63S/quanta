name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Get version from pubspec
        id: version
        run: |
          RAW=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          DISPLAY=$(echo $RAW | sed 's/+/./')
          echo "display=$DISPLAY" >> $GITHUB_OUTPUT

      - name: Build macOS
        run: flutter build macos --release

      - name: Zip app
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            build/macos/Build/Products/Release/Quanta.app \
            Quanta-macOS-v${{ steps.version.outputs.display }}.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          name: Quanta v${{ steps.version.outputs.display }}
          files: Quanta-macOS-v${{ steps.version.outputs.display }}.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Get version from pubspec
        id: version
        run: |
          RAW=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          DISPLAY=$(echo $RAW | sed 's/+/./')
          echo "display=$DISPLAY" >> $GITHUB_OUTPUT

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk Quanta-Android-v${{ steps.version.outputs.display }}.apk

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          name: Quanta v${{ steps.version.outputs.display }}
          files: Quanta-Android-v${{ steps.version.outputs.display }}.apk
