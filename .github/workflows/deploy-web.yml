name: Deploy Web

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --base-href /quanta-app/calc/ --release

      - name: Copy to docs/calc
        run: |
          rm -rf docs/calc
          cp -r build/web docs/calc

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/calc
          git diff --staged --quiet || git commit -m "chore: deploy web app [skip ci]"
          git push
