name: Beta Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ── Windows ──────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath quanta-windows.zip
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: quanta-windows
          path: quanta-windows.zip

  # ── macOS ─────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Zip
        run: |
          cd build/macos/Build/Products/Release
          zip -r ~/quanta-macos.zip quanta.app
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: quanta-macos
          path: ~/quanta-macos.zip

  # ── iOS (unsigned — sideload via AltStore / simulator) ───────────────────
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - name: Zip .app
        run: |
          cd build/ios/iphoneos
          zip -r ~/quanta-ios.zip Runner.app
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: quanta-ios
          path: ~/quanta-ios.zip

  # ── Android ───────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-java@v4.7.0
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: quanta-android
          path: build/app/outputs/flutter-apk/app-release.apk

  # ── Publish rolling beta release ──────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-ios, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts

      - name: Delete existing beta release & tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete beta --yes 2>/dev/null || true
          git push origin :refs/tags/beta 2>/dev/null || true

      - name: Create rolling beta release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: beta
          name: Quanta Beta (latest)
          prerelease: false
          make_latest: "true"
          files: |
            artifacts/quanta-windows/quanta-windows.zip
            artifacts/quanta-macos/quanta-macos.zip
            artifacts/quanta-ios/quanta-ios.zip
            artifacts/quanta-android/app-release.apk
          body: |
            Latest beta build from `main` — **${{ github.sha }}**

            | Platform | File |
            |---|---|
            | Windows | `quanta-windows.zip` → extract → run `quanta.exe` |
            | macOS | `quanta-macos.zip` → extract → open `quanta.app` |
            | iOS | `quanta-ios.zip` → unsigned, sideload via AltStore |
            | Android | `app-release.apk` → enable "Install unknown apps" → install |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
