name: quanta
description: CFD/Futures Position Size Calculator for Quantower traders
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  package_info_plus: ^9.0.0
  provider: ^6.1.1
  url_launcher: ^6.3.2
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  ios: true
  android: true
  image_path: "assets/icon.png"
  ios_content_mode: scaleAspectFill
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "assets/icon.png"

flutter:
  uses-material-design: true
